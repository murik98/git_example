name: Проверка связи с Google

# Сценарий запускается при любом push-коммите в репозиторий
on: [push]

jobs:
  ping-test:
    # Используем актуальную версию операционной системы Ubuntu
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем файлы репозитория (стандартное действие)
      - name: Проверка репозитория
        uses: actions/checkout@v4

      # Шаг 2: Выполняем обычную консольную команду ping
      - name: Проверяем доступ к Google через HTTP
        run: |
          echo "Отправляем веб-запрос к Google..."
          curl -I https://www.google.com
